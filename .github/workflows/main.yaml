name: Build PostHog .NET SDK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  PackageDirectory: ${{ github.workspace }}/build/packages/Release
  DOTNET_VERSION: 9.0.102

permissions:
  checks: write
  contents: read
  pull-requests: read

jobs:
  classify-changes:
    name: Classify changed files
    runs-on: ubuntu-latest
    outputs:
      skip_heavy: ${{ steps.classify.outputs.skip_heavy }}
      reason: ${{ steps.classify.outputs.reason }}
    steps:
      - name: Classify changes for required CI
        id: classify
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          skip_heavy=false
          reason="heavy CI runs by default"

          if [[ "${EVENT_NAME}" != "pull_request" ]]; then
            reason="${EVENT_NAME} event runs heavy CI"
          elif [[ -z "${PR_NUMBER}" ]]; then
            reason="missing pull request number; running heavy CI"
          else
            changed_files="$(mktemp)"
            if ! gh api --paginate "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files" --jq '.[] | .filename, (.previous_filename // empty)' > "${changed_files}"; then
              reason="failed to list changed files; running heavy CI"
            elif [[ ! -s "${changed_files}" ]]; then
              reason="no changed files detected; running heavy CI"
            else
              echo "Changed and previous files:"
              sed 's/^/  - /' "${changed_files}"

              is_safe_file() {
                local file="$1"

                case "${file}" in
                  *.md|docs/*|.github/ISSUE_TEMPLATE/*|.github/PULL_REQUEST_TEMPLATE/*|.github/pull_request_template.md|.github/CODEOWNERS|CODEOWNERS|.github/dependabot.yml)
                    return 0
                    ;;
                  .github/workflows/release.yml|.github/workflows/release.yaml|\
                  .github/workflows/publish.yml|.github/workflows/publish.yaml|\
                  .github/workflows/stale.yml|.github/workflows/stale.yaml|\
                  .github/workflows/lint-pr.yml|.github/workflows/lint-pr.yaml|\
                  .github/workflows/call-flags-project-board.yml|.github/workflows/call-flags-project-board.yaml|\
                  .github/workflows/changeset-hygiene.yml|.github/workflows/changeset-hygiene.yaml|\
                  .github/workflows/dependabot-changeset.yml|.github/workflows/dependabot-changeset.yaml|\
                  .github/workflows/validate-versioning.yml|.github/workflows/validate-versioning.yaml|\
                  .github/workflows/new-pr.yml|.github/workflows/new-pr.yaml|\
                  .github/workflows/generated-files-notice.yml|.github/workflows/generated-files-notice.yaml|\
                  .github/workflows/posthog-upgrade.yml|.github/workflows/posthog-upgrade.yaml|\
                  .github/workflows/posthog-watcher-*.yml|.github/workflows/posthog-watcher-*.yaml)
                    return 0
                    ;;
                  *)
                    return 1
                    ;;
                esac
              }

              skip_heavy=true
              reason="all changed filenames and previous filenames are globally safe"

              while IFS= read -r file; do
                if ! is_safe_file "${file}"; then
                  skip_heavy=false
                  reason="at least one filename or previous filename requires heavy CI"
                  break
                fi
              done < "${changed_files}"
            fi
          fi

          echo "skip_heavy=${skip_heavy}" >> "${GITHUB_OUTPUT}"
          echo "reason=${reason}" >> "${GITHUB_OUTPUT}"
          echo "skip_heavy=${skip_heavy} (${reason})"

  build:
    needs: classify-changes
    name: Build and package
    runs-on: ubuntu-latest
    steps:
      - name: Complete non-impacting change check
        if: needs.classify-changes.outputs.skip_heavy == 'true'
        run: echo "Skipping heavy build/package work because ${{ needs.classify-changes.outputs.reason }}."
      - name: Checkout main branch
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET Core
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet Packages
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        run: dotnet restore --locked-mode
        shell: bash

      # This builds the solution, creates NuGet packages, and runs PublicApiAnalyzers.
      # If a public API change is intentional, run `dotnet build --configuration Release`
      # locally and commit the relevant PublicAPI.Shipped.txt/PublicAPI.Unshipped.txt updates.
      - name: Build
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        run: dotnet build --configuration Release --no-restore --nologo
        shell: bash

  package:
    needs: classify-changes
    name: Package (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: PostHog
            project: src/PostHog/PostHog.csproj
          - name: PostHog.AI
            project: src/PostHog.AI/PostHog.AI.csproj
          - name: PostHog.AspNetCore
            project: src/PostHog.AspNetCore/PostHog.AspNetCore.csproj
    steps:
      - name: Complete non-impacting change check
        if: needs.classify-changes.outputs.skip_heavy == 'true'
        run: echo "Skipping heavy package work because ${{ needs.classify-changes.outputs.reason }}."
      - name: Checkout main branch
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET Core
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet Packages
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        run: dotnet restore --locked-mode
        shell: bash

      - name: Pack ${{ matrix.name }}
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        run: dotnet pack "${{ matrix.project }}" --configuration Release --no-restore --nologo --output "${{ env.PackageDirectory }}" /p:GeneratePackageOnBuild=false
        shell: bash

  test:
    needs: classify-changes
    name: Test
    runs-on: ubuntu-latest
    # Run tests independently so build, test, and format feedback can complete in parallel.
    steps:
      - name: Complete non-impacting change check
        if: needs.classify-changes.outputs.skip_heavy == 'true'
        run: echo "Skipping heavy test work because ${{ needs.classify-changes.outputs.reason }}."
      - name: Checkout main branch
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET Core
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet Packages
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        run: dotnet restore --locked-mode
        shell: bash

      - name: Run Tests
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        run: dotnet test --logger "trx;LogFileName=test-results.trx" --configuration Release --no-restore --nologo
        shell: bash

      - name: Collect Test Results
        if: ${{ needs.classify-changes.outputs.skip_heavy != 'true' && (github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) }}
        uses: dorny/test-reporter@d61b558e8df85cb60d09ca3e5b09653b4477cea7 # v1
        with:
          name: "xUnit Tests"
          path: "tests/*/TestResults/test-results.trx"
          reporter: 'dotnet-trx'

      - name: Upload Test Snapshots
        if: ${{ needs.classify-changes.outputs.skip_heavy != 'true' && (failure()) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verify-test-results
          retention-days: 7
          path: |
            **/*.received.*

  format:
    needs: classify-changes
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Complete non-impacting change check
        if: needs.classify-changes.outputs.skip_heavy == 'true'
        run: echo "Skipping heavy format work because ${{ needs.classify-changes.outputs.reason }}."
      - name: Checkout main branch
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet Packages
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        run: dotnet restore --locked-mode
        shell: bash

      - name: Set up dotnet-format problem matcher
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        run: echo "::add-matcher::$GITHUB_WORKSPACE/.github/problemMatchers/dotnet-format.json"
        shell: bash

      - name: Format!
        if: needs.classify-changes.outputs.skip_heavy != 'true'
        run: bin/fmt --check
        shell: bash
